services:
  web-service:
    build: 
      context: .
    depends_on:
      - model-service
    image: benbehat/playground:latest
    ports:
      - "80:8080" # Für Azure auf Port 80
    restart: always

  model-service:
    image: deepjavalibrary/djl-serving:0.26.0
    command: djl-serving -m sentiment_analysis=djl://ai.djl.pytorch/distilbert
    ports:
      - "8081:8080"
    restart: always
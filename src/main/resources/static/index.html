<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sentiment Analyse</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">
            <div class="glass-card text-center">
                
                <div class="icon-container">
                    <i class="bi bi-robot"></i>
                </div>
                
                <h2 class="fw-bold mb-2">Deep Learning AI</h2>
                <p class="text-muted mb-4">Geben Sie einen Text ein, und unsere KI analysiert die Stimmung (Sentiment).</p>

                <div class="mb-4 text-start">
                    <label for="inputText" class="form-label fw-medium"><i class="bi bi-chat-left-text me-2"></i>Ihr Text:</label>
                    <textarea class="form-control" id="inputText" rows="4" placeholder="Beispiel: Ich liebe diese neue App, sie ist fantastisch!"></textarea>
                </div>

                <button id="analyzeBtn" class="btn btn-analyze" onclick="analyzeText()">
                    <i class="bi bi-magic me-2"></i> Stimmung analysieren
                </button>
                
                <div id="loadingIndicator" class="mt-4" style="display: none;">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Lade...</span>
                    </div>
                    <p class="mt-2 text-muted">KI analysiert den Text...</p>
                </div>

                <div id="resultContainer" class="result-container text-start">
                    <hr class="my-4">
                    <h5 class="fw-bold mb-3"><i class="bi bi-bar-chart-fill me-2 text-primary"></i>Ergebnis:</h5>
                    <div id="barsContainer"></div>
                </div>

            </div>
        </div>
    </div>
</div>

</body>
</html>
